<!DOCTYPE html>
<html>
<head>
<title>Employee Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

<aside class="sidebar">

<button class="sidebar-close" id="sidebarClose" type="button">
Back
</button>

<div class="brand">

<div class="brand-mark">EMS</div>

<div class="brand-text">
<h1>Employee</h1>
<p>Self Service</p>
</div>

</div>

<nav class="nav">

<button class="nav-link active" onclick="showPanel('attendance')">
Attendance
</button>

<button class="nav-link" onclick="showPanel('leave')">
Request Leave
</button>

<button class="nav-link" onclick="showPanel('history')">
Leave History
</button>

</nav>

</aside>


<main class="content">

<header class="topbar">

<button class="menu-button" id="menuToggle" type="button" aria-label="Open menu" aria-expanded="false">
Menu
</button>

<div>
<h2>Employee Dashboard</h2>
<p class="subtitle">Your activity</p>
</div>

</header>


<section class="panel active" id="attendance">

<div class="card">

<h4>Attendance</h4>

<div class="action-row">

<button class="primary-button" id="checkIn">Check In</button>
<button class="ghost-button" id="checkOut">Check Out</button>

</div>

</div>

</section>


<section class="panel" id="leave">

<div class="card form-card">

<h4>Request Leave</h4>

<form id="leaveForm">

<label>
Employee
<input name="employee" required>
</label>

<label>
Leave Type
<select name="type">
<option value="Sick">Sick</option>
<option value="Casual">Casual</option>
<option value="Earned">Earned</option>
</select>
</label>

<label>
Start Date
<input type="date" name="startDate" required>
</label>

<label>
End Date
<input type="date" name="endDate" required>
</label>

<label>
Reason
<textarea name="reason"></textarea>
</label>

<button class="primary-button">
Submit
</button>

</form>

</div>

</section>

<section class="panel" id="history">

<div class="card table-card">

<h4>Leave History</h4>

<table class="table" id="leaveHistoryTable">

<thead>
<tr>
<th>Employee</th>
<th>Type</th>
<th>Start</th>
<th>End</th>
<th>Status</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</section>

</main>

</div>


<script src="employee.js"></script>

<script>

function showPanel(panel){

document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"))

const target = document.getElementById(panel)
if(target){
target.classList.add("active")
}

}

</script>

</body>
</html>
